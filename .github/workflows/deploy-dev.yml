name: Deploy Dev

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy to development
        required: true
        default: main
      reason:
        description: Why this development deployment is being run
        required: true
        type: string

env:
  AZURE_DEV_RESOURCE_GROUP: ${{ vars.AZURE_DEV_RESOURCE_GROUP }}
  AZURE_DEV_WEB_APP_NAME: ${{ vars.AZURE_DEV_WEB_APP_NAME }}
  AZURE_DEV_API_APP_NAME: ${{ vars.AZURE_DEV_API_APP_NAME }}

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY != '' && secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_Y2xlcmsuYWNjb3VudHMuZGV2JA==' }}
    steps:
      - name: Validate development deployment configuration
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          set -euo pipefail
          if [ -z "$AZURE_CREDENTIALS" ]; then
            echo "::error::AZURE_CREDENTIALS is not configured in development environment secrets."
            exit 1
          fi
          if [ -z "${AZURE_DEV_RESOURCE_GROUP}" ] || [ -z "${AZURE_DEV_WEB_APP_NAME}" ] || [ -z "${AZURE_DEV_API_APP_NAME}" ]; then
            echo "::error::AZURE_DEV_RESOURCE_GROUP, AZURE_DEV_WEB_APP_NAME, and AZURE_DEV_API_APP_NAME repository/environment variables must be configured for a real dev deployment."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Deployment context
        run: |
          echo "Dev deploy requested by: ${{ github.actor }}"
          echo "Deploy ref: ${{ github.event.inputs.ref }}"
          echo "Reason: ${{ github.event.inputs.reason }}"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run typecheck && npm run test && npm run build

      - name: Create deployment package
        run: |
          set -euo pipefail
          git archive --format=zip --output development-deploy.zip HEAD

      - name: Deploy web app to development
        run: |
          set -euo pipefail
          az webapp deploy \
            --resource-group "$AZURE_DEV_RESOURCE_GROUP" \
            --name "$AZURE_DEV_WEB_APP_NAME" \
            --src-path development-deploy.zip \
            --type zip \
            --restart true

      - name: Deploy API app to development
        run: |
          set -euo pipefail
          az webapp deploy \
            --resource-group "$AZURE_DEV_RESOURCE_GROUP" \
            --name "$AZURE_DEV_API_APP_NAME" \
            --src-path development-deploy.zip \
            --type zip \
            --restart true
