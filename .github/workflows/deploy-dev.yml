name: Deploy Dev

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure Clerk key is configured
        run: |
          if [ -z "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY secret is not configured" >&2
            exit 1
          fi

      - name: Validate
        run: npm run typecheck && npm run test && npm run build

      - name: Deploy to Development
        env:
          DEPLOY_DEV_COMMAND: ${{ secrets.DEPLOY_DEV_COMMAND }}
        run: |
          if [ -z "$DEPLOY_DEV_COMMAND" ]; then
            echo "DEPLOY_DEV_COMMAND secret is not configured" >&2
            exit 1
          fi
          sh -c "$DEPLOY_DEV_COMMAND"
