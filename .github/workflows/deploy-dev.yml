name: Deploy Dev

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY != '' && secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_Y2xlcmsuYWNjb3VudHMuZGV2JA==' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: npm run typecheck && npm run test && npm run build

      - name: Deploy to Development
        env:
          DEPLOY_DEV_COMMAND: ${{ secrets.DEPLOY_DEV_COMMAND }}
        run: |
          set -euo pipefail
          if [ -z "$DEPLOY_DEV_COMMAND" ]; then
            echo "::error::DEPLOY_DEV_COMMAND secret is not configured. This workflow must run a real deployment command."
            exit 1
          fi
          sh -c "$DEPLOY_DEV_COMMAND"
