name: Deploy Production Containers

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch, tag, or commit SHA)
        required: true
        default: main
      target:
        description: Which service to deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - web
          - api
      run_migration:
        description: DB schema migration (auto = run only when the prisma schema changed since the last prod release)
        required: false
        default: auto
        type: choice
        options:
          - auto
          - always
          - never
      reason:
        description: Why this production container deployment is being run
        required: true
        type: string

permissions:
  contents: write
  issues: write

env:
  AZURE_RESOURCE_GROUP: workforce-rg
  AZURE_WEB_APP_NAME: spaceorder-web-app-poc2
  AZURE_API_APP_NAME: spaceorder-api-app-poc
  AZURE_DB_SERVER_NAME: sao-workforce-db
  AZURE_WEB_APP_URL: https://spaceorder-web-app-poc2.azurewebsites.net
  AZURE_API_HEALTH_URL: https://spaceorder-api-app-poc-h7hef6a2gtd5euhq.israelcentral-01.azurewebsites.net/health
  IMAGE_NAME_PREFIX: spaceorder

jobs:
  deploy-prod-containers:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    env:
      CONTAINER_REGISTRY_SERVER: ${{ vars.CONTAINER_REGISTRY_SERVER }}
    steps:
      - name: Validate deployment configuration
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$AZURE_CREDENTIALS" ]; then
            echo "::error::AZURE_CREDENTIALS is not configured in production environment secrets."
            exit 1
          fi
          if [ -z "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ]; then
            echo "::error::NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is not configured in production environment secrets."
            exit 1
          fi
          if [ -z "${CONTAINER_REGISTRY_SERVER}" ]; then
            echo "::error::CONTAINER_REGISTRY_SERVER must be configured as a production environment variable."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Deployment context
        run: |
          echo "Deploy requested by: ${{ github.actor }}"
          echo "Deploy ref: ${{ github.event.inputs.ref }}"
          echo "Deploy target: ${{ github.event.inputs.target }}"
          echo "Reason: ${{ github.event.inputs.reason }}"

      - name: Capture release metadata
        run: |
          set -euo pipefail
          echo "DEPLOY_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=containers-prod-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set image metadata
        run: |
          set -euo pipefail
          echo "IMAGE_TAG=sha-${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      - name: Resolve registry credentials from Azure
        run: |
          set -euo pipefail
          acr_name="${CONTAINER_REGISTRY_SERVER%%.*}"
          acr_username="$(az acr credential show --name "$acr_name" --query username -o tsv)"
          acr_password="$(az acr credential show --name "$acr_name" --query 'passwords[0].value' -o tsv)"
          echo "::add-mask::$acr_username"
          echo "::add-mask::$acr_password"
          echo "CONTAINER_REGISTRY_USERNAME=$acr_username" >> "$GITHUB_ENV"
          echo "CONTAINER_REGISTRY_PASSWORD=$acr_password" >> "$GITHUB_ENV"

      - name: Authenticate container registry
        run: |
          set -euo pipefail
          echo "$CONTAINER_REGISTRY_PASSWORD" | docker login "$CONTAINER_REGISTRY_SERVER" --username "$CONTAINER_REGISTRY_USERNAME" --password-stdin

      - name: Build and push web image
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'web'
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL != '' && vars.NEXT_PUBLIC_API_URL || 'https://spaceorder-api-app-poc-h7hef6a2gtd5euhq.israelcentral-01.azurewebsites.net/api/v1' }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL != '' && vars.NEXT_PUBLIC_APP_URL || 'https://spaceorder-web-app-poc2.azurewebsites.net' }}
          NEXT_PUBLIC_AZURE_MAPS_KEY: ${{ secrets.NEXT_PUBLIC_AZURE_MAPS_KEY }}
        run: |
          set -euo pipefail
          WEB_IMAGE="$CONTAINER_REGISTRY_SERVER/$IMAGE_NAME_PREFIX-web:$IMAGE_TAG"
          echo "WEB_IMAGE=$WEB_IMAGE" >> "$GITHUB_ENV"
          docker build \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" \
            --build-arg NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" \
            --build-arg NEXT_PUBLIC_APP_URL="$NEXT_PUBLIC_APP_URL" \
            --build-arg NEXT_PUBLIC_AZURE_MAPS_KEY="$NEXT_PUBLIC_AZURE_MAPS_KEY" \
            -t "$WEB_IMAGE" .
          docker push "$WEB_IMAGE"
          echo "DEPLOYED_WEB_IMAGE=$WEB_IMAGE" >> "$GITHUB_ENV"

      - name: Build and push API image
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'api'
        run: |
          set -euo pipefail
          API_IMAGE="$CONTAINER_REGISTRY_SERVER/$IMAGE_NAME_PREFIX-api:$IMAGE_TAG"
          echo "API_IMAGE=$API_IMAGE" >> "$GITHUB_ENV"
          docker build -f packages/api/Dockerfile -t "$API_IMAGE" .
          docker push "$API_IMAGE"
          echo "DEPLOYED_API_IMAGE=$API_IMAGE" >> "$GITHUB_ENV"

      - name: Deploy web container
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'web'
        run: |
          set -euo pipefail
          az webapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEB_APP_NAME" \
            --settings WEBSITES_PORT=8080 >/dev/null

          az webapp config container set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEB_APP_NAME" \
            --container-image-name "$WEB_IMAGE" \
            --container-registry-url "https://$CONTAINER_REGISTRY_SERVER" \
            --container-registry-user "$CONTAINER_REGISTRY_USERNAME" \
            --container-registry-password "$CONTAINER_REGISTRY_PASSWORD"

          az webapp restart \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEB_APP_NAME"

      - name: Decide whether to run DB migration
        id: migrate
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'api'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_MIGRATION: ${{ github.event.inputs.run_migration }}
        run: |
          set -euo pipefail

          # Manual overrides.
          if [ "${RUN_MIGRATION:-auto}" = "never" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping DB migration (run_migration=never)."
            exit 0
          fi
          if [ "${RUN_MIGRATION:-auto}" = "always" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Running DB migration (run_migration=always)."
            exit 0
          fi

          # auto: run only when the prisma schema changed since the last prod release.
          prev_tag="$(gh release list --limit 40 --json tagName \
            -q '[.[] | select(.tagName | startswith("containers-prod-"))] | .[0].tagName' 2>/dev/null || true)"
          if [ -z "$prev_tag" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "No previous prod release found; running DB migration."
            exit 0
          fi
          prev_sha="$(gh release view "$prev_tag" --json targetCommitish -q .targetCommitish 2>/dev/null || true)"
          if [ -z "$prev_sha" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Could not resolve previous release commit; running DB migration."
            exit 0
          fi

          # Ensure both commits are available for the diff (checkout is shallow).
          git fetch --no-tags --depth=1 origin "$prev_sha" >/dev/null 2>&1 || git fetch --unshallow >/dev/null 2>&1 || true

          if git diff --quiet "$prev_sha" "$GITHUB_SHA" -- packages/database/prisma/schema.prisma 2>/dev/null; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No prisma schema change since $prev_tag ($prev_sha); skipping DB migration."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Prisma schema changed since $prev_tag ($prev_sha); running DB migration."
          fi

      - name: Migrate database schema (prisma db push)
        if: (github.event.inputs.target == 'all' || github.event.inputs.target == 'api') && steps.migrate.outputs.run == 'true'
        run: |
          set -euo pipefail

          database_url="$(az webapp config appsettings list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_API_APP_NAME" \
            --query "[?name=='DATABASE_URL'].value | [0]" -o tsv)"
          if [ -z "$database_url" ]; then
            echo "::error::DATABASE_URL app setting not found on $AZURE_API_APP_NAME"
            exit 1
          fi
          echo "::add-mask::$database_url"

          runner_ip="$(curl -sS -4 https://api.ipify.org)"
          echo "::add-mask::$runner_ip"
          rule_name="ci-migrate-${GITHUB_RUN_ID}"

          cleanup_firewall() {
            az postgres flexible-server firewall-rule delete \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --server-name "$AZURE_DB_SERVER_NAME" \
              --name "$rule_name" --yes >/dev/null 2>&1 || true
          }
          trap cleanup_firewall EXIT

          az postgres flexible-server firewall-rule create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --server-name "$AZURE_DB_SERVER_NAME" \
            --name "$rule_name" \
            --start-ip-address "$runner_ip" \
            --end-ip-address "$runner_ip" >/dev/null

          # Run prisma db push inside the freshly built API image (it already
          # contains the prisma CLI and schema). Additive changes only; retry
          # to allow the firewall rule to propagate.
          pushed=false
          for attempt in $(seq 1 6); do
            if docker run --rm -e DATABASE_URL="$database_url" "$API_IMAGE" \
                 npm run --workspace @workforce/database db:push -- --skip-generate; then
              pushed=true
              break
            fi
            echo "db push attempt $attempt failed; waiting for firewall propagation..."
            sleep 15
          done
          if [ "$pushed" != true ]; then
            echo "::error::prisma db push failed after retries"
            exit 1
          fi

      - name: Deploy API container
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'api'
        run: |
          set -euo pipefail
          # Keep the app's listen port (API_PORT) in sync with the port App
          # Service routes to (WEBSITES_PORT), and pin a startup command that
          # does not contain shell operators (App Service passes it as argv).
          az webapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_API_APP_NAME" \
            --settings WEBSITES_PORT=3001 API_PORT=3001 >/dev/null

          az webapp config set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_API_APP_NAME" \
            --startup-file "npm run start --workspace @workforce/api" >/dev/null

          az webapp config container set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_API_APP_NAME" \
            --container-image-name "$API_IMAGE" \
            --container-registry-url "https://$CONTAINER_REGISTRY_SERVER" \
            --container-registry-user "$CONTAINER_REGISTRY_USERNAME" \
            --container-registry-password "$CONTAINER_REGISTRY_PASSWORD"

          az webapp restart \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_API_APP_NAME"

      - name: Verify production API health
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'api'
        run: |
          set -euo pipefail
          curl --fail --silent --show-error "$AZURE_API_HEALTH_URL"

      - name: Create deployment release
        if: success() && github.event.inputs.target == 'all'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --title "Production containers ${RELEASE_TAG}" \
            --notes "Automated production container deployment.\n\nWeb image: ${DEPLOYED_WEB_IMAGE:-n/a}\nAPI image: ${DEPLOYED_API_IMAGE:-n/a}\nTriggered by: ${{ github.actor }}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Write deployment summary
        if: always()
        run: |
          set -euo pipefail
          end_epoch="$(date +%s)"
          start_epoch="${DEPLOY_START_EPOCH:-$end_epoch}"
          duration="$((end_epoch - start_epoch))"
          {
            echo "## Production Container Deployment"
            echo
            echo "- Status: ${{ job.status }}"
            echo "- Target: ${{ github.event.inputs.target }}"
            echo "- Duration: ${duration}s"
            echo "- Web app: ${AZURE_WEB_APP_URL}"
            echo "- API health: ${AZURE_API_HEALTH_URL}"
            echo "- Web image: ${DEPLOYED_WEB_IMAGE:-n/a}"
            echo "- API image: ${DEPLOYED_API_IMAGE:-n/a}"
            echo "- Release tag: ${RELEASE_TAG:-n/a}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create failure alert issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh issue create \
            --title "Production container deploy failed (run ${{ github.run_number }})" \
            --body "Deployment failed for target '${{ github.event.inputs.target }}'.\n\nRun URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\nActor: ${{ github.actor }}\nRef: ${{ github.event.inputs.ref }}\nReason: ${{ github.event.inputs.reason }}" || true
