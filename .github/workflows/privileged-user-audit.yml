name: Privileged User Audit (read-only)

# Read-only diagnostic: lists all OWNER and ADMIN User records in production so a
# human can confirm every privileged account maps to a legitimate staff member.
# Runs a FIXED SELECT only — it never writes. Returns user id, role, active flag
# and creation timestamp only (no tokens, emails, names or other PII). Opens a
# temporary DB firewall rule for the runner IP and removes it on exit (same
# pattern as report-audit.yml).

on:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  AZURE_RESOURCE_GROUP: workforce-rg
  AZURE_API_APP_NAME: spaceorder-api-app-poc
  AZURE_DB_SERVER_NAME: sao-workforce-db

jobs:
  privileged-user-audit:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: List privileged users (read-only)
        run: |
          set -euo pipefail
          sudo apt-get update -y >/dev/null 2>&1 || true
          sudo apt-get install -y postgresql-client >/dev/null 2>&1 || true

          database_url="$(az webapp config appsettings list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_API_APP_NAME" \
            --query "[?name=='DATABASE_URL'].value | [0]" -o tsv)"
          if [ -z "$database_url" ]; then
            echo "::error::DATABASE_URL app setting not found on $AZURE_API_APP_NAME"
            exit 1
          fi
          echo "::add-mask::$database_url"

          runner_ip="$(curl -sS -4 https://api.ipify.org)"
          echo "::add-mask::$runner_ip"
          rule_name="ci-priv-audit-${GITHUB_RUN_ID}"
          cleanup_firewall() {
            az postgres flexible-server firewall-rule delete \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --server-name "$AZURE_DB_SERVER_NAME" \
              --name "$rule_name" --yes >/dev/null 2>&1 || true
          }
          trap cleanup_firewall EXIT
          az postgres flexible-server firewall-rule create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --server-name "$AZURE_DB_SERVER_NAME" \
            --name "$rule_name" \
            --start-ip-address "$runner_ip" \
            --end-ip-address "$runner_ip" >/dev/null

          echo "===== OWNER / ADMIN users (id, role, isActive, createdAt) ====="
          psql "$database_url" -P pager=off -A -F '|' -c "
            SELECT id, role, \"isActive\", \"createdAt\"
            FROM users
            WHERE role IN ('OWNER','ADMIN')
            ORDER BY role, \"createdAt\";
          "

          echo "===== User counts by role ====="
          psql "$database_url" -P pager=off -A -F '|' -c "
            SELECT role, count(*) AS total, count(*) FILTER (WHERE \"isActive\") AS active
            FROM users
            GROUP BY role
            ORDER BY role;
          "

          echo "===== Privileged users created in the last 24h (anomaly check) ====="
          psql "$database_url" -P pager=off -A -F '|' -c "
            SELECT id, role, \"isActive\", \"createdAt\"
            FROM users
            WHERE role IN ('OWNER','ADMIN')
              AND \"createdAt\" > now() - interval '24 hours'
            ORDER BY \"createdAt\";
          "
