name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch, tag, or commit SHA)
        required: true
        default: main
      reason:
        description: Why this production deployment is being run
        required: true
        type: string

permissions:
  contents: read

env:
  AZURE_RESOURCE_GROUP: workforce-rg
  AZURE_WEB_APP_NAME: spaceorder-web-app-poc2
  AZURE_API_APP_NAME: spaceorder-api-app-poc
  AZURE_API_HEALTH_URL: https://spaceorder-api-app-poc-h7hef6a2gtd5euhq.israelcentral-01.azurewebsites.net/health

jobs:
  deploy-prod:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate production deployment configuration
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$AZURE_CREDENTIALS" ]; then
            echo "::error::AZURE_CREDENTIALS is not configured in production environment secrets."
            exit 1
          fi
          if [ -z "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ]; then
            echo "::error::NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is not configured in production environment secrets."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Deployment context
        run: |
          echo "Deploy requested by: ${{ github.actor }}"
          echo "Deploy ref: ${{ github.event.inputs.ref }}"
          echo "Reason: ${{ github.event.inputs.reason }}"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: npm run typecheck && npm run test && npm run build

      - name: Create prebuilt deployment package
        run: |
          set -euo pipefail
          rm -f production-deploy.zip
          zip -r production-deploy.zip \
            package.json \
            package-lock.json \
            node_modules \
            apps/web \
            packages/api \
            packages/shared \
            packages/database \
            -x '**/.git/**' \
            -x '**/.turbo/**' \
            -x '**/.next/cache/**' \
            -x '**/node_modules/.cache/**' \
            -x '**/coverage/**' \
            -x '**/*.log'

      - name: Deploy web app to production
        run: |
          set -euo pipefail
          az webapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEB_APP_NAME" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false >/dev/null

          profile="$(az webapp deployment list-publishing-profiles -g "$AZURE_RESOURCE_GROUP" -n "$AZURE_WEB_APP_NAME" --xml)"
          publish_url="$(printf '%s' "$profile" | perl -ne 'if (/publishMethod="ZipDeploy".*?publishUrl="([^"]+)"/) { $u=$1; $u =~ s/:443$//; print $u; exit }')"
          deploy_user="$(printf '%s' "$profile" | perl -ne 'if (/publishMethod="ZipDeploy".*?userName="([^"]+)"/) { print $1; exit }')"
          deploy_pass="$(printf '%s' "$profile" | perl -ne 'if (/publishMethod="ZipDeploy".*?userPWD="([^"]+)"/) { print $1; exit }')"
          echo "::add-mask::$deploy_user"
          echo "::add-mask::$deploy_pass"
          az webapp deploy \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEB_APP_NAME" \
            --src-path production-deploy.zip \
            --type zip \
            --restart true \
            --async true \
            --track-status false

          for attempt in $(seq 1 80); do
            http_code="$(curl -sS -u "$deploy_user:$deploy_pass" -o "$RUNNER_TEMP/web-deploy.json" -w '%{http_code}' "https://$publish_url/api/deployments/latest" || true)"
            if [ "$http_code" = "200" ]; then
              status="$(jq -r '.status // empty' "$RUNNER_TEMP/web-deploy.json")"
              progress="$(jq -r '.progress // ""' "$RUNNER_TEMP/web-deploy.json")"
              echo "Web deployment status: $status $progress"
              if [ "$status" = "4" ]; then
                break
              fi
              if [ "$status" = "3" ]; then
                echo "::error::Web app deployment failed."
                cat "$RUNNER_TEMP/web-deploy.json"
                exit 1
              fi
            elif [ "$http_code" = "401" ]; then
              echo "::error::Web deployment polling failed with HTTP 401 from Kudu."
              exit 1
            else
              echo "Web deployment poll returned HTTP $http_code; waiting for Kudu to finish..."
            fi

            if [ "$attempt" -eq 80 ]; then
              echo "::error::Timed out waiting for web app deployment to complete."
              exit 1
            fi
            sleep 15
          done

      - name: Deploy API app to production
        run: |
          set -euo pipefail
          az webapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_API_APP_NAME" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false >/dev/null

          profile="$(az webapp deployment list-publishing-profiles -g "$AZURE_RESOURCE_GROUP" -n "$AZURE_API_APP_NAME" --xml)"
          publish_url="$(printf '%s' "$profile" | perl -ne 'if (/publishMethod="ZipDeploy".*?publishUrl="([^"]+)"/) { $u=$1; $u =~ s/:443$//; print $u; exit }')"
          deploy_user="$(printf '%s' "$profile" | perl -ne 'if (/publishMethod="ZipDeploy".*?userName="([^"]+)"/) { print $1; exit }')"
          deploy_pass="$(printf '%s' "$profile" | perl -ne 'if (/publishMethod="ZipDeploy".*?userPWD="([^"]+)"/) { print $1; exit }')"
          echo "::add-mask::$deploy_user"
          echo "::add-mask::$deploy_pass"
          az webapp deploy \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_API_APP_NAME" \
            --src-path production-deploy.zip \
            --type zip \
            --restart true \
            --async true \
            --track-status false

          for attempt in $(seq 1 80); do
            http_code="$(curl -sS -u "$deploy_user:$deploy_pass" -o "$RUNNER_TEMP/api-deploy.json" -w '%{http_code}' "https://$publish_url/api/deployments/latest" || true)"
            if [ "$http_code" = "200" ]; then
              status="$(jq -r '.status // empty' "$RUNNER_TEMP/api-deploy.json")"
              progress="$(jq -r '.progress // ""' "$RUNNER_TEMP/api-deploy.json")"
              echo "API deployment status: $status $progress"
              if [ "$status" = "4" ]; then
                break
              fi
              if [ "$status" = "3" ]; then
                echo "::error::API app deployment failed."
                cat "$RUNNER_TEMP/api-deploy.json"
                exit 1
              fi
            elif [ "$http_code" = "401" ]; then
              echo "::error::API deployment polling failed with HTTP 401 from Kudu."
              exit 1
            else
              echo "API deployment poll returned HTTP $http_code; waiting for Kudu to finish..."
            fi

            if [ "$attempt" -eq 80 ]; then
              echo "::error::Timed out waiting for API app deployment to complete."
              exit 1
            fi
            sleep 15
          done

      - name: Verify production API health
        run: |
          set -euo pipefail
          curl --fail --silent --show-error "$AZURE_API_HEALTH_URL"
