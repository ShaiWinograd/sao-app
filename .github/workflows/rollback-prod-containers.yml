name: Rollback Production Containers

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which service to rollback
        required: true
        default: all
        type: choice
        options:
          - all
          - web
          - api
      web_tag:
        description: Web image tag to rollback to (required for web/all)
        required: false
        type: string
      api_tag:
        description: API image tag to rollback to (required for api/all)
        required: false
        type: string
      reason:
        description: Reason for rollback
        required: true
        type: string

permissions:
  contents: read

env:
  AZURE_RESOURCE_GROUP: workforce-rg
  AZURE_WEB_APP_NAME: spaceorder-web-app-poc2
  AZURE_API_APP_NAME: spaceorder-api-app-poc
  AZURE_API_HEALTH_URL: https://spaceorder-api-app-poc-h7hef6a2gtd5euhq.israelcentral-01.azurewebsites.net/health
  IMAGE_NAME_PREFIX: spaceorder

jobs:
  rollback-prod-containers:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    env:
      CONTAINER_REGISTRY_SERVER: ${{ vars.CONTAINER_REGISTRY_SERVER }}
    steps:
      - name: Validate rollback input
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          set -euo pipefail

          if [ -z "$AZURE_CREDENTIALS" ]; then
            echo "::error::AZURE_CREDENTIALS is not configured in production environment secrets."
            exit 1
          fi
          if [ -z "${CONTAINER_REGISTRY_SERVER}" ]; then
            echo "::error::CONTAINER_REGISTRY_SERVER must be configured as a production environment variable."
            exit 1
          fi

          target="${{ github.event.inputs.target }}"
          if [ "$target" = "all" ] || [ "$target" = "web" ]; then
            if [ -z "${{ github.event.inputs.web_tag }}" ]; then
              echo "::error::web_tag is required for target $target"
              exit 1
            fi
          fi
          if [ "$target" = "all" ] || [ "$target" = "api" ]; then
            if [ -z "${{ github.event.inputs.api_tag }}" ]; then
              echo "::error::api_tag is required for target $target"
              exit 1
            fi
          fi

      - name: Rollback context
        run: |
          echo "Rollback requested by: ${{ github.actor }}"
          echo "Target: ${{ github.event.inputs.target }}"
          echo "Web tag: ${{ github.event.inputs.web_tag }}"
          echo "API tag: ${{ github.event.inputs.api_tag }}"
          echo "Reason: ${{ github.event.inputs.reason }}"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve registry credentials from Azure
        run: |
          set -euo pipefail
          acr_name="${CONTAINER_REGISTRY_SERVER%%.*}"
          acr_username="$(az acr credential show --name "$acr_name" --query username -o tsv)"
          acr_password="$(az acr credential show --name "$acr_name" --query 'passwords[0].value' -o tsv)"
          echo "::add-mask::$acr_username"
          echo "::add-mask::$acr_password"
          echo "CONTAINER_REGISTRY_USERNAME=$acr_username" >> "$GITHUB_ENV"
          echo "CONTAINER_REGISTRY_PASSWORD=$acr_password" >> "$GITHUB_ENV"

      - name: Rollback web container
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'web'
        run: |
          set -euo pipefail
          web_image="$CONTAINER_REGISTRY_SERVER/$IMAGE_NAME_PREFIX-web:${{ github.event.inputs.web_tag }}"
          echo "Rolling back web to $web_image"

          az webapp config container set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEB_APP_NAME" \
            --container-image-name "$web_image" \
            --container-registry-url "https://$CONTAINER_REGISTRY_SERVER" \
            --container-registry-user "$CONTAINER_REGISTRY_USERNAME" \
            --container-registry-password "$CONTAINER_REGISTRY_PASSWORD"

          az webapp restart \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEB_APP_NAME"

      - name: Rollback API container
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'api'
        run: |
          set -euo pipefail
          api_image="$CONTAINER_REGISTRY_SERVER/$IMAGE_NAME_PREFIX-api:${{ github.event.inputs.api_tag }}"
          echo "Rolling back API to $api_image"

          az webapp config container set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_API_APP_NAME" \
            --container-image-name "$api_image" \
            --container-registry-url "https://$CONTAINER_REGISTRY_SERVER" \
            --container-registry-user "$CONTAINER_REGISTRY_USERNAME" \
            --container-registry-password "$CONTAINER_REGISTRY_PASSWORD"

          az webapp restart \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_API_APP_NAME"

      - name: Verify production API health
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'api'
        run: |
          set -euo pipefail
          curl --fail --silent --show-error "$AZURE_API_HEALTH_URL"
