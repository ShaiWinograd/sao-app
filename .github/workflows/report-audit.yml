name: Customer Report Audit (read-only)

# Read-only diagnostic: proves whether finalized CustomerReportVersion rows exist
# in production and reports their metadata (IDs, version number, whether PDF bytes
# exist, case status, and how many jobs are bound via reportedAt). Runs a FIXED
# SELECT only — it never writes. Opens a temporary DB firewall rule for the runner
# IP and removes it on exit (same pattern as the deploy migration step).

on:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  AZURE_RESOURCE_GROUP: workforce-rg
  AZURE_API_APP_NAME: spaceorder-api-app-poc
  AZURE_DB_SERVER_NAME: sao-workforce-db

jobs:
  report-audit:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Query finalized customer reports (read-only)
        run: |
          set -euo pipefail
          sudo apt-get update -y >/dev/null 2>&1 || true
          sudo apt-get install -y postgresql-client >/dev/null 2>&1 || true

          database_url="$(az webapp config appsettings list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_API_APP_NAME" \
            --query "[?name=='DATABASE_URL'].value | [0]" -o tsv)"
          if [ -z "$database_url" ]; then
            echo "::error::DATABASE_URL app setting not found on $AZURE_API_APP_NAME"
            exit 1
          fi
          echo "::add-mask::$database_url"

          runner_ip="$(curl -sS -4 https://api.ipify.org)"
          echo "::add-mask::$runner_ip"
          rule_name="ci-report-audit-${GITHUB_RUN_ID}"
          cleanup_firewall() {
            az postgres flexible-server firewall-rule delete \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --server-name "$AZURE_DB_SERVER_NAME" \
              --name "$rule_name" --yes >/dev/null 2>&1 || true
          }
          trap cleanup_firewall EXIT
          az postgres flexible-server firewall-rule create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --server-name "$AZURE_DB_SERVER_NAME" \
            --name "$rule_name" \
            --start-ip-address "$runner_ip" \
            --end-ip-address "$runner_ip" >/dev/null

          echo "===== FINALIZED CUSTOMER REPORT VERSIONS (most recent first) ====="
          psql "$database_url" -P pager=off -A -F '|' -c "
            SELECT
              crv.id            AS version_id,
              crv.\"caseId\"    AS case_id,
              cc.\"customerId\" AS customer_id,
              crv.\"versionNumber\" AS version_number,
              (crv.pdf IS NOT NULL AND octet_length(crv.pdf) > 0) AS pdf_bytes_exist,
              octet_length(crv.pdf) AS pdf_byte_length,
              cc.status         AS case_status,
              (SELECT count(*) FROM jobs j WHERE j.\"caseId\" = crv.\"caseId\") AS jobs_in_case,
              (SELECT count(*) FROM jobs j WHERE j.\"caseId\" = crv.\"caseId\" AND j.\"reportedAt\" IS NOT NULL) AS jobs_with_reportedAt
            FROM customer_report_versions crv
            JOIN customer_cases cc ON cc.id = crv.\"caseId\"
            ORDER BY crv.\"createdAt\" DESC
            LIMIT 50;
          "
          echo "===== TOTAL customer_report_versions ====="
          psql "$database_url" -P pager=off -A -t -c "SELECT count(*) FROM customer_report_versions;"
